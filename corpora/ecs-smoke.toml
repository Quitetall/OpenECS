# OpenECS smoke corpus — a tiny, redistributable, SYNTHETIC EEG corpus.
#
# Ships in-repo so OpenECS runs offline with zero external data (SPEC/OpenECS-v1.0.md
# §8). NOT patient data: deterministic band-placed sinusoids in the EDF i16
# digital domain, regenerable byte-for-byte via
# `cargo run --example gen_smoke_corpus`. Paths are relative to this file's
# directory. For real public corpora (CHB-MIT, TUEG, …) see README.md and pin
# them locally with `openecs emit-corpus-manifest`.

